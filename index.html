<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời Mời Đặc Biệt ✨</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="night">
        <!-- Floating Sparkles -->
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="sparkle s4"></div>
        <div class="sparkle s5"></div>
        <div class="sparkle s6"></div>
        <div class="sparkle s7"></div>
        <div class="sparkle s8"></div>
    </div>

    <div class="container">
        <div class="wrapper">
            <div class="lid one"></div>
            <div class="lid two"></div>
            <div class="envelope"></div>
            <div class="letter">
                <div class="letter-inner">
                    <h1>Thân gửi</h1>
                    <p>Đừng giận tớ nữa nha</p>
                    <p>Đừng giận tớ nha huhu</p>
                    <p>Đạt khum có ý tiêu cực mô huuhu</p>
                    <p class="sig">Thân gửi!<br>— [Nhỏ iu dấu] —</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="openBtn">Mở Thư 💌</button>
            <button id="closeBtn" style="display: none;">Đóng Thư 🔒</button>
        </div>
    </div>

    <div class="flowers">
        <div class="flower"></div>
        <div class="flower"></div>
        <div class="flower"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
